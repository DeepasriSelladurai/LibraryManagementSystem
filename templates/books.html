
{% extends "base.html" %}
{% block content %}
<style>
.main-content {
  padding: 20%;
  flex-grow: 1;
}

.sidebar a {
  display: flex;
  padding: 10px;
  background-color: aqua;
  border: 1px solid #ddd;
  border-radius: 5px;
  margin-bottom: 10px;
  text-decoration: none;
  color: black;
}

.genre , .book-card{
  text-align: center;
  margin-bottom: 25px;
  align-items: center;
  display: block;
  justify-content: center;
  padding: 5% 25%;
  border: 1px solid #ddd;
  border-radius: 5%;
  margin-bottom: 10px;
  background-color:whitesmoke;
  position: relative;
}

.book-card-container {
  display: block;
  justify-content: space-around;
  overflow:hidden;
  width: 100%;
  padding: 5%;
}

.book-card {

  display: block; /* Show all book cards */
  padding: 5%;
  align-items: center;
}

.book-image {
  padding:5% ;
  width: 250px; /* Adjust the size as needed */
  height: 250px;
  margin-bottom: 10px;
}

.book-image img {
  width: 100%;
  height: 100%;
  padding: 10%;
  border-radius: 5px;
  align-content: center;
}
.container{
  padding-top: 2%;
  padding-right: 25%;
  padding-left: 25%;
}

</style>
<div class="container">
  
  <div class="main-content">
      <div class="book-card-container">
          {% for book in books %}
          <div class="book-card">
              <div class="book-image">
                  <img src="{{ url_for('static', filename=book.image) }}" alt="{{ book.title }}">
              </div>
              <div class="book-card-details">
                  <h4>Book Title: {{ book.title }}</h4>
                  <p>Author: {{ book.author }}</p>
                  <p>Release Date: {{ book.release_date }}</p>
              </div>
              <div>
                <a href="reserve_book/{{book.title}}" class="btn btn-primary">Reserve Book Now</a>
              </div>
          </div>
          {% endfor %}
      </div>
  </div>
</div>
{% endblock %}
