{% extends "base.html" %}

{% block content %}
    <h2>Login</h2>
    <form action="{{ url_for('login') }}" class="login-container" >
        <div>
            <label for="id">Member ID:</label>
            <input type="text" id="id" name="id" required>
        </div>
        <br>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button class="btn btn-primary" action="{{ url_for('login') }}">Login</button>
    </form>
<style>
    .login-container {
    background-color: #fff;
    padding:2% 25%;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    width: 50;
    text-align: center;
}

.login-container h2 {
    margin: 0 0 20px;
    color: #333;
}

.login-container label {
    display: block;
    margin-bottom: 5px;
    color: #666;
}
.login-container input[type="text"]{
    width: 10%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #333;
    border-radius: 5px;
    box-sizing: border-box;
}
.login-container input[type="email"] {
    width: 50%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #333;
    border-radius: 5px;
    box-sizing: border-box;
}

.login-container input[type="submit"] {
    background-color: #5cb85c;
    color: #fff;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

.login-container input[type="submit"]:hover {
    background-color: #4cae4c;
}
</style>
{% endblock %}
