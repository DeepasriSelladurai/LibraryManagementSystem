{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1 class="text-center">BOOK LIST</h1>
    
    <!-- Membership Details Section -->
    <table class="table table-striped mt-4">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Release Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.release_date }}</td>
                <td>
                 <div>
                    <button onclick="viewBook('{{ book.title }}')" class="btn btn-secondary">View Details</button>
                    <a href="reserve_book/{{book.title}}" class="btn btn-primary">Reserve Book Now</a> 
                 </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script>
    function viewBook(title) {
        window.location.href = `/view_book/${title}`;
      }</script>
</div>
<style>
    .profile-container {
        padding: 5% 15%;
        margin: 20%;
        border: 15px solid #ddd;
    }
    .profile-header {
        background-color: #007bff;
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
    .mt-5{
        padding: 10% 25%;
        margin: 15%;
        border: 15px solid green;

    }
    .container {
        padding: 2%;
        margin: 10%;
        border: 5px solid #ddd;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: space-between;
    }
    form{
        padding: 5%;
        margin: 2%;
        display: inline-block;
        justify-content: space-between;
    }
    table {
    width: 100%;
    border-collapse: collapse;
    margin: 2px 0;
    font-size: 0.9em;
    font-family: sans-serif;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
}

table thead tr {
    background-color: #009879;
    color: #ffffff;
    text-align: left;
}

table th,
table td {
    padding: 12px 15px;
    border: 1px solid #ddd;
}

table tbody tr {
    border-bottom: 1px solid #dddddd;
}

table tbody tr:nth-of-type(even) {
    background-color: #f3f3f3;
}

table tbody tr:last-of-type {
    border-bottom: 2px solid #009879;
}

table tbody tr:hover {
    background-color: #f5f5f5;
    cursor: pointer;
}

.btn {
    background-color: #009879;
    margin: 2px;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 0.8em;
}

.btn-primary ,.btn-success , .btn-danger {
    border: none;
}

</style>
{% endblock %}
