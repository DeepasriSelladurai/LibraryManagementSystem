{% extends "base.html" %}
{% block content %}
<body>
    <header>
        <h1>Extend Membership</h1>
    </header>
    <main>
        <style>
            /* styles.css */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    color: #333;
    margin: 0;
    padding: 0;
}

header {
    background-color: #007bff;
    color: white;
    padding: 10px 0;
    text-align: center;
}

h1 {
    margin: 0;
}

main {
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

label {
    display: block;
    margin: 10px 0 5px;
}

input[type="text"], select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

input[type="submit"] {
    background-color: #007bff;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
}

input[type="submit"]:hover {
    background-color: #0056b3;
}

a {
    color: #007bff;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

p {
    text-align: center;
}

        </style>
            <form action="/extend_membership" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" value="{{user['name']}}"><br><br>
    
            <label for="membership_type">Membership Type:</label>
            <select id="membership_type" name="membership_type" required>
                <option value="annual">Annual</option>
                <option value="half-year">Half-Year</option>
                <option value="quarter">Quarter</option>
            </select><br><br>
    
            
            <input type="submit" value="Submit">
        </form>
        
            <p>Please <a href="{{ url_for('login') }}">login</a> to extend your membership.</p>
        </main>
{% endblock %}
