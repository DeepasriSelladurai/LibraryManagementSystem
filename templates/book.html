{% extends "base.html" %}
{% block content %}
<style>
.main-content {
  padding: 20%;
  flex-grow: 1;
}

.sidebar a {
  display: flex;
  padding: 10px;
  background-color: aqua;
  border: 1px solid #ddd;
  border-radius: 5px;
  margin-bottom: 10px;
  text-decoration: none;
  color: black;
}

.genre , .book-card{
  text-align: center;
  margin-bottom: 25px;
  align-items: center;
  display: block;
  justify-content: center;
  padding: 5% 25%;
  border: 1px solid #ddd;
  border-radius: 5%;
  margin-bottom: 10px;
  background-color:whitesmoke;
  position: relative;
}

.book-card-container {
  display: block;
  justify-content: space-around;
  overflow:hidden;
  width: 100%;
  padding: 5%;
}

.book-card {

  display: block; /* Show all book cards */
  padding: 5%;
  align-items: center;
}

.book-image {
  padding:5% ;
  width: 250px; /* Adjust the size as needed */
  height: 250px;
  margin-bottom: 10px;
}

.book-image img {
  width: 100%;
  height: 100%;
  padding: 10%;
  border-radius: 5px;
  align-content: center;
}
.container{
  padding-top: 2%;
  padding-right: 25%;
  padding-left: 25%;
}

.genre-filter {
  display: flex;
  justify-content: space-evenly;
  padding: 10px;
  margin-bottom: 20px;
}

.genre-filter button {
  width: 100%;
  padding: 10px 20px;
  background-color: aqua;
  border: 1px solid #ddd;
  border-radius: 5px;
  cursor: pointer;
}

.genre-filter button:active {
  background-color: black;
  color: white;
}
</style>
<div class="container">

  <div class="genre-filter">
    <button onclick="filterGenre(1)"><strong>Literature</strong></button>
    <button onclick="filterGenre(2)"><strong>History</strong></button>
    <button onclick="filterGenre(3)"><strong>Adventures</strong></button>
    <button onclick="filterGenre(4)"><strong>Fiction</strong></button>
    <button onclick="filterGenre(5)"><strong>Non Fiction</strong></button>
    <button onclick="filterGenre(6)"><strong>Children</strong></button>
  </div>

  <div class="main-content">
    <div class="book-card-container">
        {% for book in books %}
        {% set genre = ((loop.index - 1) // 5 + 1) %}
        <div class="book-card" data-genre="{{ genre }}">
            <div class="book-image">
                <img src="{{ url_for('static', filename=book.image) }}" alt="{{ book.title }}">
            </div>
            <div class="book-card-details">
                <h4>Book Title: {{ book.title }}</h4>
                <p>Author: {{ book.author }}</p>
                <p>Genre: Genre {{ genre }}</p>
                <p>Release Date: {{ book.release_date }}</p>
            </div>
            <div>
              <a href="reserve_book/{{book.title}}" class="btn btn-primary">Reserve Book Now</a>
            </div>
        </div>
        {% endfor %}
    </div>
  </div>
</div>

<script>
function filterGenre(genre) {
  const bookCards = document.querySelectorAll('.book-card');
  bookCards.forEach(card => {
    if (card.getAttribute('data-genre') == genre) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>
{% endblock %}
